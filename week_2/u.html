<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox Playground</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

/* =========================
   BUTTONS
========================= */
button {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
}

/* =========================
   FLEX CONTAINER
========================= */
.container {
  display: flex;
  gap: 10px;

  /* IMPORTANT: we will change this with buttons */
  height: 300px;
  border: 2px solid black;
  margin-top: 20px;
}

/* FLEX ITEMS */
.box {
  width: 60px;
  height: 60px;
  background: lightblue;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Flexbox align-items Playground</h2>

<!-- BUTTONS TO CHANGE ALIGNMENT -->
<button onclick="setAlign('flex-start')">flex-start</button>
<button onclick="setAlign('center')">center</button>
<button onclick="setAlign('flex-end')">flex-end</button>
<button onclick="setAlign('stretch')">stretch</button>
<button onclick="setAlign('baseline')">baseline</button>

<!-- FLEX CONTAINER -->
<div class="container" id="boxContainer">

  <div class="box">1</div>

  <!-- bigger text to show baseline effect -->
  <div class="box" style="font-size: 30px;">2</div>

  <div class="box">3</div>

</div>

<script>
function setAlign(value) {
  document.getElementById("boxContainer").style.alignItems = value;
}
</script>

</body>
</html>
